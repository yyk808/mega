# Definitions of third-party libraries used for buck2 build of buck2.
# This file is **not** used by cargo build of buck2.
# See the <project_root>/docs/bootstrapping.md for more details.

[workspace]

[package]
# Pseudo-package whose dependencies are imported and buckified
name = "rust-third-party"
version = "0.0.0"
publish = false
edition = "2021"

# Dummy target to keep Cargo happy
[[bin]]
name = "top"
path = "top/main.rs"

# List of packages to be imported, with version constraints, features
# and all options Cargo supports.
[build-dependencies]
cmake = "0.1.50"
num_cpus = "1.16.0"

[dependencies]
libc = "0.2.155"
anyhow = "1.0.86"
serde = "1.0.203"
serde_json = "1.0.117"
tracing = "0.1.40"
tracing-subscriber = "0.3.18"
tracing-appender = "0.2"
thiserror = "1.0.61"
rand = "0.8.5"
smallvec = "1.13.2"
tokio = { version = "1.38.0", features = ["rt-multi-thread", "rt", "macros"]}
tokio-stream = "0.1.15"
tokio-test = "0.4.4"
rayon = "1.10.0"
clap = { version = "4.5.4", features = ["derive"]}
async-trait = "0.1.80"
async-stream = "0.3.5"
bytes = "1.6.0"
memchr = "2.7.2"
chrono = "0.4.38"
sha1 = "0.10.6"
sha256 = "1.5"
futures = "0.3.30"
futures-util = "0.3.30"
go-defer = "0.1.0"
russh = "0.44.0"
russh-keys = "0.44.0"
axum = "0.7.5"
tower-http = { version = "0.5.2", features = [
    "cors",
    "trace",
    "decompression-full",
]}
tower = "0.4.13"
hex = "0.4.3"
sea-orm = { version = "0.12.15", features = [
    "sqlx-sqlite",
    "runtime-tokio-rustls",
    "macros",
]}
flate2 = "1.0.30"
bstr = "1.9.1"
colored = "2.1.0"
idgenerator = "2.0.0"
num_cpus = "1.16.0"
config = "0.14.0"
shadow-rs = "0.30.0"
reqwest = { version = "0.12.5", features = ["stream"]}
tokio-util = { version = "0.7.11", features = ["io"] }
color-backtrace = "0.6.1"
byteorder = "1.5.0"
path_abs = "0.5.1"
pathdiff = "0.2.1"
url = "2.5.0"
rpassword = "7.3.1"
indicatif = "0.17.8"
envsubst = "0.2.1"
ring = "=0.17.5" # Upgrading this is possible, but a pain, so we don't want to pick up every new minor version
async-openai = "0.23.4"
rusty_vault = { git = "https://github.com/Tongsuo-Project/RustyVault.git", version = "0.1.0"}
zeroize = "1.7.0"
md5 = "0.7.0"
sha2 = "0.10.8"
memmap2 = "0.9.4"
pgp = "0.11.0"
fs2 = "0.4.3"
gettext-rs = "0.7.0"
gettext-sys = "0.21.0"
axum-server = { version = "0.7", features = ["tls-rustls"] }
sha1_smol = "1.0.0"
threadpool = "1.8.1"
dashmap = "6.0.1"
lru-mem = "0.3.0"
bincode = "1.3.3"
itertools = "0.13.0"
cedar-policy = "3.2.1"
once_cell = "1.19.0"
fuse-backend-rs = "0.12.0"
fuser = "0.14.0"
log = "0.4.22"
radix_trie = "0.2.1"
signal-hook = "0.3.17"
openssl = "0.10.64"
lazy_static = "1.5.0"
secp256k1 = { version = "0.29.0", features = ["serde", "rand"] }
bs58 = "0.5.1"

[target.'cfg(unix)'.dependencies] # only on Unix
pager = "0.16.0"

[target.'cfg(windows)'.dependencies] # only on Windows
mimalloc = "0.1.39" # avoid sticking on dropping on Windows

[dev-dependencies]
tracing-test = "0.2.4"
tokio-util = { version = "0.7.11", features = ["io"] }
